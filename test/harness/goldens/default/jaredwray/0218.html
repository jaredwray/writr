<h1 id="security-policy">Security Policy</h1>
<p>We want to ensure that the project is safe for everyone. If you have discovered a security vulnerability, please report it to us at <a href="https://github.com/jaredwray/mockhttp">https://github.com/jaredwray/mockhttp</a> as an issue. We will review all reports and do our best to quickly fix the problem.</p>
