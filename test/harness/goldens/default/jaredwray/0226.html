<h1 id="security-policy">Security Policy</h1>
<p>To report a security vulnerability, please create an issue and send an email to <a href="mailto:me@jaredwray.com">me@jaredwray.com</a>. Once the issue has been validated, we will open a <a href="https://docs.github.com/en/code-security/repository-security-advisories/about-github-security-advisories-for-repositories">Github Security Advisory</a>, if necessary.</p>
